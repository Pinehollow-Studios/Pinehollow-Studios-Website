      <stop offset="96%" stop-color="rgba(0,0,0,0.45)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.8)"/>
    </radialGradient>
    <filter id="pb-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <g clip-path="url(#pb-clip)">
    <rect width="1024" height="1024" fill="url(#pb-field)"/>
    <line x1="0" y1="690" x2="1024" y2="690" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <circle cx="512" cy="512" r="280" fill="#3FE5A0" opacity="0.30" filter="url(#pb-glow)"/>
    <circle cx="512" cy="512" r="240" fill="url(#pb-bloom)"/>
    <circle cx="512" cy="500" r="170" fill="url(#pb-core)"/>
    <circle cx="512" cy="512" r="240" fill="none" stroke="#3FE5A0" stroke-width="6" opacity="0.85"/>
    <circle cx="512" cy="512" r="240" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <circle cx="512" cy="512" r="240" fill="url(#pb-rim)"/>
    <rect width="1024" height="1024" fill="url(#pb-sheen)"/>
    <path d="M0 484 C 0 168, 168 0, 484 0 L 540 0 C 856 0, 1024 168, 1024 484 L 1024 540 C 1024 856, 856 1024, 540 1024 L 484 1024 C 168 1024, 0 856, 0 540 Z" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="3"/>
